site_name: Customized Gradebook Docs
site_description: Developer documentation for the Customized Gradebook Canvas extension
site_url: https://morenet-canvas.github.io/CustomizedGradebook/docs/

repo_name: morenet-canvas/CustomizedGradebook
repo_url: https://github.com/morenet-canvas/CustomizedGradebook

docs_dir: docs-src
site_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Debug Tooling: dev-tools.md
  - Build Pipeline: build-pipeline.md
  - State Machine: state-machine.md
  - Sync Modules: sync-modules.md
  - Data Layer: data-layer.md
  - API Service Layer: api-service-layer.md
  - Page Detection: page-detection.md
  - Power Law Algorithm: power-law.md
  - Configuration: configuration.md
  - Canvas API Gotchas: canvas-api-gotchas.md
  - Feature Walkthroughs:
      - Mastery Outlook: walkthroughs/mastery-outlook.md
      - Mastery View: walkthroughs/mastery-view.md
      - Supporting Tools: walkthroughs/supporting-tools.md
  - Admin Dashboard: admin-dashboard.md
  - Account Filtering: account-filtering.md
  - Mobile Module:
      - Overview: mobile/overview.md
      - Installation: mobile/installation.md
      - Setup Guide: mobile/setup.md
  - Development:
      - Workflows: development/workflows.md
      - Versioning: development/versioning.md