  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lative;\">\n    <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:40px;\">\n      <span style=\"display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.28);color:#ffffff;font-size:24px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:9px 18px;border-radius:999px;\">Beta<\u002Fspan>\n      <span style=\"font-size:24px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.78);\">Self-guided walkthrough<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:132px;font-weight:700;letter-spacing:-0.03em;line-height:0.98;max-width:1400px;\">Using Mastery Outlook<\u002Fh1>\n    <p style=\"margin:36px 0 0;font-size:46px;font-weight:500;color:rgba(255,255,255,0.86);max-width:1100px;line-height:1.25;\">A friendly tour for teachers — set it up once, then let Power Law do the predicting.<\u002Fp>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-top:72px;\">\n      <span style=\"background:#cdeccd;color:#2f7a3d;font-weight:700;font-size:26px;padding:11px 22px;border-radius:14px;\">3.4<\u002Fspan>\n      <span style=\"background:#fbe2b3;color:#9a6c12;font-weight:700;font-size:26px;padding:11px 22px;border-radius:14px;\">2.4<\u002Fspan>\n      <span style=\"background:#f4c3c3;color:#b14a4a;font-weight:700;font-size:26px;padding:11px 22px;border-radius:14px;\">1.8<\u002Fspan>\n      <span style=\"background:rgba(255,255,255,0.16);color:#ffffff;font-weight:700;font-size:26px;padding:11px 22px;border-radius:14px;\">NE<\u002Fspan>\n      <span style=\"margin-left:8px;font-size:24px;color:rgba(255,255,255,0.7);\">Power Law (Marzano) predictions, right inside Canvas<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 2 · WHAT IT DOES ───────────────────────── -->\n  <section data-label=\"What It Does\" data-screen-label=\"02\" data-speaker-notes=\"Two halves: what Mastery Outlook is, and what it quietly changes in your Canvas course.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:46px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">Overview<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">What Mastery Outlook does<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;gap:40px;min-height:0;\">\n      <div style=\"flex:1;background:#ffffff;border:1px solid #ECE4D6;border-radius:24px;padding:48px 46px;box-shadow:0 18px 36px -24px rgba(40,40,40,0.22);display:flex;flex-direction:column;\">\n        <span style=\"align-self:flex-start;background:#EAF4F1;color:#15806F;font-weight:700;font-size:24px;letter-spacing:0.04em;padding:9px 18px;border-radius:999px;margin-bottom:30px;\">What it is<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:26px;\">\n          <div style=\"display:flex;gap:18px;\"><span style=\"flex-shrink:0;width:11px;height:11px;border-radius:999px;background:#15806F;margin-top:13px;\"><\u002Fspan><span style=\"font-size:31px;line-height:1.4;color:#3A3D45;\">A teacher-facing tool that calculates Power Law predictions and updates outcome scores in Canvas<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:18px;\"><span style=\"flex-shrink:0;width:11px;height:11px;border-radius:999px;background:#15806F;margin-top:13px;\"><\u002Fspan><span style=\"font-size:31px;line-height:1.4;color:#3A3D45;\">Power Law (Marzano) predictions of where each student is heading<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:18px;\"><span style=\"flex-shrink:0;width:11px;height:11px;border-radius:999px;background:#15806F;margin-top:13px;\"><\u002Fspan><span style=\"font-size:31px;line-height:1.4;color:#3A3D45;\">Visible to teachers, TAs, admins and designers only — never students<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:#ffffff;border:1px solid #ECE4D6;border-radius:24px;padding:48px 46px;box-shadow:0 18px 36px -24px rgba(40,40,40,0.22);display:flex;flex-direction:column;\">\n        <span style=\"align-self:flex-start;background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;letter-spacing:0.04em;padding:9px 18px;border-radius:999px;margin-bottom:30px;\">What it changes in Canvas<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:26px;\">\n          <div style=\"display:flex;gap:18px;\"><span style=\"flex-shrink:0;width:11px;height:11px;border-radius:999px;background:#C99A2E;margin-top:13px;\"><\u002Fspan><span style=\"font-size:31px;line-height:1.4;color:#3A3D45;\">Sets each outcome's calculation to <b style=\"color:#1C1E24;\">Most Recent<\u002Fb><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:18px;\"><span style=\"flex-shrink:0;width:11px;height:11px;border-radius:999px;background:#C99A2E;margin-top:13px;\"><\u002Fspan><span style=\"font-size:31px;line-height:1.4;color:#3A3D45;\">Creates a dashboard page and adds a Mastery Outlook link to your course nav<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:18px;\"><span style=\"flex-shrink:0;width:11px;height:11px;border-radius:999px;background:#C99A2E;margin-top:13px;\"><\u002Fspan><span style=\"font-size:31px;line-height:1.4;color:#3A3D45;\">Adds a restricted Files folder that caches data — teachers only<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:28px;display:flex;gap:20px;align-items:center;background:#14776B;border-radius:16px;padding:26px 32px;\">\n      <span style=\"flex-shrink:0;background:#FBEEDA;color:#A9741A;font-weight:800;font-size:24px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 18px;border-radius:999px;white-space:nowrap;\">🔥 Hot tip<\u002Fspan>\n      <span style=\"font-size:28px;font-weight:600;line-height:1.38;color:#ffffff;\">You can drag and drop outcomes to reorder them. The order is saved and reflected in the student-facing Mastery Dashboard.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 3 · WHY MOST RECENT ───────────────────────── -->\n  <section data-label=\"Most Recent\" data-screen-label=\"03\" data-speaker-notes=\"The one concept to understand: grading resets the outcome score, so run the sync to put the prediction back on top.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">Why it matters<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">Why “Most Recent” matters<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 44px;font-size:32px;line-height:1.4;color:#5C5F66;max-width:1300px;\">The last assignment graded becomes the outcome score. Mastery Outlook works with that, in a simple loop:<\u002Fp>\n    <div style=\"flex:1;display:flex;align-items:stretch;gap:18px;\">\n      <div style=\"flex:1;background:#ffffff;border:1px solid #ECE4D6;border-radius:24px;padding:42px 38px;box-shadow:0 18px 36px -24px rgba(40,40,40,0.22);display:flex;flex-direction:column;\">\n        <span style=\"display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:999px;background:#14776B;color:#fff;font-weight:700;font-size:30px;margin-bottom:26px;\">1<\u002Fspan>\n        <h3 style=\"margin:0 0 16px;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#1C1E24;line-height:1.1;\">You grade an assignment<\u002Fh3>\n        <p style=\"margin:0;font-size:28px;line-height:1.42;color:#5C5F66;\">The raw rubric score immediately becomes that student's outcome score.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;font-size:46px;color:#C9BCA6;font-weight:700;\">→<\u002Fdiv>\n      <div style=\"flex:1;background:#ffffff;border:1px solid #ECE4D6;border-radius:24px;padding:42px 38px;box-shadow:0 18px 36px -24px rgba(40,40,40,0.22);display:flex;flex-direction:column;\">\n        <span style=\"display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:999px;background:#14776B;color:#fff;font-weight:700;font-size:30px;margin-bottom:26px;\">2<\u002Fspan>\n        <h3 style=\"margin:0 0 16px;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#1C1E24;line-height:1.1;\">You run Mastery Outlook<\u002Fh3>\n        <p style=\"margin:0;font-size:28px;line-height:1.42;color:#5C5F66;\">A hidden assignment is graded with the Power Law prediction — now the most recent score.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;font-size:46px;color:#C9BCA6;font-weight:700;\">→<\u002Fdiv>\n      <div style=\"flex:1;background:#ffffff;border:1px solid #ECE4D6;border-radius:24px;padding:42px 38px;box-shadow:0 18px 36px -24px rgba(40,40,40,0.22);display:flex;flex-direction:column;\">\n        <span style=\"display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:999px;background:#14776B;color:#fff;font-weight:700;font-size:30px;margin-bottom:26px;\">3<\u002Fspan>\n        <h3 style=\"margin:0 0 16px;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#1C1E24;line-height:1.1;\">Students see the PL score<\u002Fh3>\n        <p style=\"margin:0;font-size:28px;line-height:1.42;color:#5C5F66;\">They see the prediction — not the raw rubric score from the assignment you graded.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:34px;background:#14776B;border-radius:20px;padding:30px 40px;display:flex;align-items:center;gap:26px;\">\n      <span style=\"flex-shrink:0;background:rgba(255,255,255,0.16);color:#fff;font-weight:700;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;padding:10px 18px;border-radius:999px;\">Remember<\u002Fspan>\n      <span style=\"font-size:32px;font-weight:600;color:#ffffff;line-height:1.3;\">Run the sync right after grading — before students check their scores.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 4 · SETTING IT UP ───────────────────────── -->\n  <section data-label=\"Setup\" data-screen-label=\"04\" data-speaker-notes=\"One-time setup. One button in Course Settings creates everything. After that it lives in your sidebar.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:46px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">Set up · one-time<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">Setting it up<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;gap:54px;align-items:stretch;\">\n      <div style=\"flex:1.45;display:flex;flex-direction:column;justify-content:center;gap:30px;\">\n        <div style=\"display:flex;gap:26px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:16px;background:#EAF4F1;color:#14776B;font-weight:700;font-size:30px;font-family:'Bricolage Grotesque',sans-serif;\">1<\u002Fspan><div style=\"padding-top:4px;\"><h3 style=\"margin:0 0 6px;font-size:33px;font-weight:700;color:#1C1E24;\">Go to Course Settings<\u002Fh3><p style=\"margin:0;font-size:28px;line-height:1.38;color:#5C5F66;\">Open the course where you want mastery tracking.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:26px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:16px;background:#EAF4F1;color:#14776B;font-weight:700;font-size:30px;font-family:'Bricolage Grotesque',sans-serif;\">2<\u002Fspan><div style=\"padding-top:4px;\"><h3 style=\"margin:0 0 6px;font-size:33px;font-weight:700;color:#1C1E24;\">Find the “Create Mastery Outlook” button<\u002Fh3><p style=\"margin:0;font-size:28px;line-height:1.38;color:#5C5F66;\">It sits on the right side of the Settings page.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:26px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:16px;background:#EAF4F1;color:#14776B;font-weight:700;font-size:30px;font-family:'Bricolage Grotesque',sans-serif;\">3<\u002Fspan><div style=\"padding-top:4px;\"><h3 style=\"margin:0 0 6px;font-size:33px;font-weight:700;color:#1C1E24;\">Click it once<\u002Fh3><p style=\"margin:0;font-size:28px;line-height:1.38;color:#5C5F66;\">This creates the page, the nav link, and the cached-data folder all at once.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:26px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:16px;background:#EAF4F1;color:#14776B;font-weight:700;font-size:30px;font-family:'Bricolage Grotesque',sans-serif;\">4<\u002Fspan><div style=\"padding-top:4px;\"><h3 style=\"margin:0 0 6px;font-size:33px;font-weight:700;color:#1C1E24;\">Open it from the sidebar<\u002Fh3><p style=\"margin:0;font-size:28px;line-height:1.38;color:#5C5F66;\">It appears as the second link, just below Home.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:#ffffff;border:1px solid #ECE4D6;border-radius:24px;padding:34px 30px;box-shadow:0 18px 36px -24px rgba(40,40,40,0.22);display:flex;flex-direction:column;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#9C9384;margin-bottom:22px;padding-left:6px;\">Course navigation<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:4px;\">\n          <div style=\"font-size:27px;color:#5C5F66;padding:15px 18px;border-radius:12px;\">Home<\u002Fdiv>\n          <div style=\"font-size:27px;color:#14776B;font-weight:700;padding:15px 18px;border-radius:12px;background:#EAF4F1;border-left:5px solid #14776B;\">Mastery Outlook<\u002Fdiv>\n          <div style=\"font-size:27px;color:#5C5F66;padding:15px 18px;border-radius:12px;\">Announcements<\u002Fdiv>\n          <div style=\"font-size:27px;color:#5C5F66;padding:15px 18px;border-radius:12px;\">Assignments<\u002Fdiv>\n          <div style=\"font-size:27px;color:#5C5F66;padding:15px 18px;border-radius:12px;\">Grades<\u002Fdiv>\n          <div style=\"font-size:27px;color:#5C5F66;padding:15px 18px;border-radius:12px;\">Settings<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 5 · GRADING WORKFLOW ───────────────────────── -->\n  <section data-label=\"Workflow\" data-screen-label=\"05\" data-speaker-notes=\"The everyday loop: grade, expand the outcome, hit Save grades to Canvas on the needs-updating banner, wait a beat.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:44px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">Daily workflow<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">The grading workflow<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;gap:56px;align-items:center;\">\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:30px;\">\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:999px;background:#14776B;color:#fff;font-weight:700;font-size:28px;\">1<\u002Fspan><div style=\"padding-top:6px;\"><h3 style=\"margin:0 0 6px;font-size:32px;font-weight:700;color:#1C1E24;\">Grade in SpeedGrader<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.38;color:#5C5F66;\">Score the assignment as you normally would.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:999px;background:#14776B;color:#fff;font-weight:700;font-size:28px;\">2<\u002Fspan><div style=\"padding-top:6px;\"><h3 style=\"margin:0 0 6px;font-size:32px;font-weight:700;color:#1C1E24;\">Expand the outcome<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.38;color:#5C5F66;\">Open Mastery Outlook and click the outcome — predictions refresh automatically.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:999px;background:#14776B;color:#fff;font-weight:700;font-size:28px;\">3<\u002Fspan><div style=\"padding-top:6px;\"><h3 style=\"margin:0 0 6px;font-size:32px;font-weight:700;color:#1C1E24;\">Save grades to Canvas<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.38;color:#5C5F66;\">Click it on any outcome showing a needs-updating banner. This also refreshes the Current Score.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\"><span style=\"flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:999px;background:#14776B;color:#fff;font-weight:700;font-size:28px;\">4<\u002Fspan><div style=\"padding-top:6px;\"><h3 style=\"margin:0 0 6px;font-size:32px;font-weight:700;color:#1C1E24;\">Give it a moment<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.38;color:#5C5F66;\">Canvas takes a few seconds to propagate. If scores lag, wait and refresh.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1.18;background:#ffffff;border:1px solid #E6DECF;border-radius:22px;padding:18px;box-shadow:0 22px 44px -26px rgba(40,40,40,0.32);\">\n        <img src=\"0710b8de-7f7d-45f5-9ec8-956cf32f6cac\" alt=\"Outcome panel showing a needs-updating banner and Save grades to Canvas button\" style=\"display:block;width:100%;height:auto;border-radius:12px;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 6 · READING THE DASHBOARD ───────────────────────── -->\n  <section data-label=\"Scores\" data-screen-label=\"07\" data-speaker-notes=\"Inside an expanded outcome: three score columns and a small set of save controls. Post is what gets sent to Canvas.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">Student scores<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">Working with student scores<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;gap:50px;align-items:center;\">\n      <div style=\"flex:1.1;display:flex;flex-direction:column;gap:22px;\">\n        <div style=\"background:#ffffff;border:1px solid #E6DECF;border-radius:22px;padding:14px;box-shadow:0 22px 44px -26px rgba(40,40,40,0.32);\">\n          <img src=\"8a060c14-92c8-467b-b368-323f2e265eb9\" alt=\"Expanded outcome showing Canvas, Marzano and Post columns with notes\" style=\"display:block;width:100%;height:auto;border-radius:12px;\">\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:26px 40px;padding:6px 8px;\">\n          <div style=\"display:flex;align-items:center;gap:13px;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:10px;background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;\">↑<\u002Fspan><span style=\"font-size:24px;color:#3A3D45;\">Save this student now<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:13px;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:10px;background:#E1F0E1;color:#3E8E4F;font-weight:700;font-size:24px;\">✓<\u002Fspan><span style=\"font-size:24px;color:#3A3D45;\">Already in sync<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:13px;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:10px;background:#EFEAE0;color:#7A7468;font-weight:700;font-size:24px;\">↺<\u002Fspan><span style=\"font-size:24px;color:#3A3D45;\">Reset Post to Marzano<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:13px;\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:10px;background:#EAF4F1;color:#14776B;font-weight:700;font-size:24px;\">🔒<\u002Fspan><span style=\"font-size:24px;color:#3A3D45;\">Lock an override<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:22px;\">\n        <div style=\"background:#ffffff;border:1px solid #ECE4D6;border-radius:18px;padding:26px 30px;box-shadow:0 14px 28px -22px rgba(40,40,40,0.22);display:flex;gap:20px;align-items:flex-start;\"><span style=\"flex-shrink:0;background:#E1F0E1;color:#3E8E4F;font-weight:700;font-size:24px;padding:8px 16px;border-radius:10px;\">Canvas<\u002Fspan><span style=\"font-size:27px;line-height:1.36;color:#3A3D45;padding-top:5px;\">The current outcome score Canvas has on record.<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#ffffff;border:1px solid #ECE4D6;border-radius:18px;padding:26px 30px;box-shadow:0 14px 28px -22px rgba(40,40,40,0.22);display:flex;gap:20px;align-items:flex-start;\"><span style=\"flex-shrink:0;background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;padding:8px 16px;border-radius:10px;\">Marzano<\u002Fspan><span style=\"font-size:27px;line-height:1.36;color:#3A3D45;padding-top:5px;\">The Power Law prediction calculated by Mastery Outlook.<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#ffffff;border:1px solid #ECE4D6;border-radius:18px;padding:26px 30px;box-shadow:0 14px 28px -22px rgba(40,40,40,0.22);display:flex;gap:20px;align-items:flex-start;\"><span style=\"flex-shrink:0;background:#EAF4F1;color:#14776B;font-weight:700;font-size:24px;padding:8px 16px;border-radius:10px;\">Post<\u002Fspan><span style=\"font-size:27px;line-height:1.36;color:#3A3D45;padding-top:5px;\">What gets sent to Canvas. Pre-filled with Marzano — click either pill to copy it, or type your own.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection><section data-label=\"Post Box\" data-screen-label=\"09\" data-speaker-notes=\"The Post box is where you control what actually gets sent to Canvas. Pre-filled with Marzano, but fully editable.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">Post box<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">Adjusting individual scores<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;gap:50px;align-items:stretch;\">\n      <div style=\"flex:1.1;background:#ffffff;border:1px solid #E6DECF;border-radius:22px;padding:14px;box-shadow:0 22px 44px -26px rgba(40,40,40,0.32);display:flex;align-items:center;justify-content:center;\">\n        <img src=\"8a060c14-92c8-467b-b368-323f2e265eb9\" alt=\"Student rows showing Canvas, Marzano and Post score columns with notes\" style=\"display:block;width:100%;height:auto;border-radius:12px;\">\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:24px;\">\n        <p style=\"margin:0 0 8px;font-size:29px;line-height:1.44;color:#5C5F66;\">The <b style=\"color:#1C1E24;\">Post<\u002Fb> box is pre-filled with the Marzano score. You have four ways to adjust it:<\u002Fp>\n        <div style=\"display:flex;gap:20px;align-items:flex-start;background:#ffffff;border:1px solid #ECE4D6;border-radius:16px;padding:24px 26px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.16);\">\n          <span style=\"flex-shrink:0;display:inline-flex;align-items:center;gap:6px;\"><span style=\"background:#E1F0E1;color:#3E8E4F;font-weight:700;font-size:24px;padding:6px 13px;border-radius:8px;\">Canvas<\u002Fspan><span style=\"color:#C9BCA6;font-size:24px;font-weight:700;\">or<\u002Fspan><span style=\"background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;padding:6px 13px;border-radius:8px;\">Marzano<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:27px;line-height:1.38;color:#3A3D45;padding-top:4px;\">Click either pill to copy that value into the Post box.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:flex-start;background:#ffffff;border:1px solid #ECE4D6;border-radius:16px;padding:24px 26px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.16);\">\n          <span style=\"flex-shrink:0;background:#EAF4F1;color:#14776B;font-weight:700;font-size:24px;padding:6px 16px;border-radius:8px;white-space:nowrap;\">Type<\u002Fspan>\n          <span style=\"font-size:27px;line-height:1.38;color:#3A3D45;padding-top:4px;\">Click the Post box and type any custom score directly.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:flex-start;background:#ffffff;border:1px solid #ECE4D6;border-radius:16px;padding:24px 26px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.16);\">\n          <span style=\"flex-shrink:0;background:#EAF4F1;color:#14776B;font-weight:700;font-size:24px;padding:6px 16px;border-radius:8px;white-space:nowrap;\">🔒 Lock<\u002Fspan>\n          <span style=\"font-size:27px;line-height:1.38;color:#3A3D45;padding-top:4px;\">Click the padlock icon (appears after typing) to lock the override — it won't be overwritten by future recalculations.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:flex-start;background:#ffffff;border:1px solid #ECE4D6;border-radius:16px;padding:24px 26px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.16);\">\n          <span style=\"flex-shrink:0;background:#EAF4F1;color:#14776B;font-weight:700;font-size:24px;padding:6px 16px;border-radius:8px;white-space:nowrap;\">Note<\u002Fspan>\n          <span style=\"font-size:27px;line-height:1.38;color:#3A3D45;padding-top:4px;\">Add a note to record why you changed a score — e.g. <i>\"counting assignment\"<\u002Fi> or <i>\"changed grade\"<\u002Fi>.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection><section data-label=\"Dashboard\" data-screen-label=\"06\" data-speaker-notes=\"The dashboard at a glance. Four metric cards summarize the class; the table lists every outcome. Rows expand and reorder.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">The dashboard<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">Reading the dashboard<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;gap:50px;align-items:stretch;\">\n      <div style=\"flex:1.04;background:#ffffff;border:1px solid #E6DECF;border-radius:22px;padding:16px;box-shadow:0 22px 44px -26px rgba(40,40,40,0.32);display:flex;align-items:center;justify-content:center;\">\n        <img src=\"fe49cf45-92c0-4c51-8266-f3e1848f3322\" alt=\"Outcomes table with metric summary and an expanded outcome\" style=\"display:block;max-width:100%;max-height:720px;height:auto;border-radius:12px;\">\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:20px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#6E7079;\">Tabs inside an expanded outcome<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:flex;align-items:center;gap:16px;background:#ffffff;border:1px solid #ECE4D6;border-radius:14px;padding:18px 22px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.18);\"><span style=\"flex-shrink:0;background:#EFEAE0;color:#5C5F66;font-weight:700;font-size:24px;padding:7px 16px;border-radius:8px;min-width:160px;text-align:center;\">All Students<\u002Fspan><span style=\"font-size:27px;line-height:1.36;color:#3A3D45;\">Every student, alphabetical<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:16px;background:#ffffff;border:1px solid #ECE4D6;border-radius:14px;padding:18px 22px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.18);\"><span style=\"flex-shrink:0;background:#F6D6D6;color:#B14A4A;font-weight:700;font-size:24px;padding:7px 16px;border-radius:8px;min-width:160px;text-align:center;\">Struggling<\u002Fspan><span style=\"font-size:27px;line-height:1.36;color:#3A3D45;\">Below threshold, sorted by PL score<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:16px;background:#ffffff;border:1px solid #ECE4D6;border-radius:14px;padding:18px 22px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.18);\"><span style=\"flex-shrink:0;background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;padding:7px 16px;border-radius:8px;min-width:160px;text-align:center;\">Declining<\u002Fspan><span style=\"font-size:27px;line-height:1.36;color:#3A3D45;\">Negative trend (slope), sorted by slope<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:16px;background:#ffffff;border:1px solid #ECE4D6;border-radius:14px;padding:18px 22px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.18);\"><span style=\"flex-shrink:0;background:#E1F0E1;color:#3E8E4F;font-weight:700;font-size:24px;padding:7px 16px;border-radius:8px;min-width:160px;text-align:center;\">Growing<\u002Fspan><span style=\"font-size:27px;line-height:1.36;color:#3A3D45;\">Positive trend, sorted by PL score<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#ffffff;border:1px solid #ECE4D6;border-radius:14px;padding:22px 24px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.18);\">\n          <span style=\"display:block;font-size:24px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6E7079;margin-bottom:14px;\">Each student row shows<\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n            <span style=\"background:#F2EDE4;color:#3A3D45;font-weight:600;font-size:25px;padding:8px 16px;border-radius:8px;\">PL Prediction<\u002Fspan>\n            <span style=\"background:#F2EDE4;color:#3A3D45;font-weight:600;font-size:25px;padding:8px 16px;border-radius:8px;\">Canvas Score<\u002Fspan>\n            <span style=\"background:#F2EDE4;color:#3A3D45;font-weight:600;font-size:25px;padding:8px 16px;border-radius:8px;\">Decaying Avg<\u002Fspan>\n            <span style=\"background:#F2EDE4;color:#3A3D45;font-weight:600;font-size:25px;padding:8px 16px;border-radius:8px;\">Mean<\u002Fspan>\n            <span style=\"background:#F2EDE4;color:#3A3D45;font-weight:600;font-size:25px;padding:8px 16px;border-radius:8px;\">Recent Score<\u002Fspan>\n            <span style=\"background:#F2EDE4;color:#3A3D45;font-weight:600;font-size:25px;padding:8px 16px;border-radius:8px;\">Trend ↑ ↓ →<\u002Fspan>\n            <span style=\"background:#F2EDE4;color:#3A3D45;font-weight:600;font-size:25px;padding:8px 16px;border-radius:8px;\">Attempt History<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:flex-start;background:#EAF4F1;border-radius:14px;padding:20px 24px;\">\n          <span style=\"flex-shrink:0;background:#14776B;color:#fff;font-weight:700;font-size:24px;letter-spacing:0.1em;text-transform:uppercase;padding:7px 14px;border-radius:999px;margin-top:2px;\">Tip<\u002Fspan>\n          <span style=\"font-size:26px;line-height:1.38;color:#2C5A52;\">Click any student name to jump directly to their individual Mastery Dashboard.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 7 · STUDENT SCORES ───────────────────────── -->\n  \n\n  <!-- ───────────────────────── SLIDE 8 · NOTES ───────────────────────── -->\n  <section data-label=\"Notes\" data-screen-label=\"08\" data-speaker-notes=\"Important for teachers to know: notes are visible to students. The hidden assignment note in Recent Feedback is a Canvas bug — be mindful of what you write.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">Student scores<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">A note about notes<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;gap:50px;align-items:stretch;\">\n      <div style=\"flex:1.2;background:#ffffff;border:1px solid #E6DECF;border-radius:22px;padding:14px;box-shadow:0 22px 44px -26px rgba(40,40,40,0.32);display:flex;align-items:center;justify-content:center;\">\n        <img src=\"67f5bb6e-a28d-4c75-b585-7d567672fcf3\" alt=\"Canvas course home page with Recent Feedback panel spotlit\" style=\"display:block;max-width:100%;max-height:740px;height:auto;border-radius:12px;\">\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:24px;\">\n        <div style=\"display:flex;gap:20px;align-items:flex-start;background:#ffffff;border:1px solid #ECE4D6;border-radius:16px;padding:26px 28px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.16);\">\n          <span style=\"flex-shrink:0;width:12px;height:12px;border-radius:999px;background:#15806F;margin-top:10px;\"><\u002Fspan>\n          <span style=\"font-size:27px;line-height:1.44;color:#3A3D45;\">Notes are saved to <b style=\"color:#1C1E24;\">both<\u002Fb> the hidden outcome assignment and the Current Score assignment in Canvas.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:flex-start;background:#ffffff;border:1px solid #ECE4D6;border-radius:16px;padding:26px 28px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.16);\">\n          <span style=\"flex-shrink:0;width:12px;height:12px;border-radius:999px;background:#15806F;margin-top:10px;\"><\u002Fspan>\n          <span style=\"font-size:27px;line-height:1.44;color:#3A3D45;\">The Current Score note is <b style=\"color:#1C1E24;\">visible to students<\u002Fb> at any time through their grades view — write accordingly.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:flex-start;background:#ffffff;border:1px solid #ECE4D6;border-radius:16px;padding:26px 28px;box-shadow:0 8px 18px -14px rgba(40,40,40,0.16);\">\n          <span style=\"flex-shrink:0;width:12px;height:12px;border-radius:999px;background:#15806F;margin-top:10px;\"><\u002Fspan>\n          <span style=\"font-size:27px;line-height:1.44;color:#3A3D45;\">Both notes appear in the <b style=\"color:#1C1E24;\">Recent Feedback<\u002Fb> panel on the course home page — as shown here.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:18px;align-items:flex-start;background:#FBEEDA;border:1px solid #F0D49A;border-radius:16px;padding:24px 28px;\">\n          <span style=\"flex-shrink:0;background:#A9741A;color:#fff;font-weight:700;font-size:24px;letter-spacing:0.08em;text-transform:uppercase;padding:7px 14px;border-radius:999px;margin-top:2px;white-space:nowrap;\">Known issue<\u002Fspan>\n          <span style=\"font-size:26px;line-height:1.38;color:#7A5210;\">The hidden assignment note appearing in Recent Feedback is likely a Canvas bug — it may be patched in a future update.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 9 · POST BOX ───────────────────────── -->\n  \n\n  <!-- ───────────────────────── SLIDE 9 · WHAT'S COMING ───────────────────────── -->\n  <section data-label=\"What's Coming\" data-screen-label=\"10\" data-speaker-notes=\"Four things actively in development. A good moment to get any feedback or wishes from the group.\" style=\"background:#FAF6EF;color:#2A2C33;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:46px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#15806F;\">On the horizon<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#1C1E24;\">What’s coming<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:#9C9384;font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#15806F;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:28px;\">\n      <div style=\"background:#ffffff;border:2px dashed #D4C9B8;border-radius:24px;padding:40px 40px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;padding:6px 16px;border-radius:999px;white-space:nowrap;\">In progress<\u002Fspan><h3 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#1C1E24;\">Rounded predictions<\u002Fh3><\u002Fdiv>\n        <p style=\"margin:0;font-size:27px;line-height:1.44;color:#5C5F66;\">Power Law scores will be rounded to the nearest 0.5 before display and before syncing to Canvas.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff;border:2px dashed #D4C9B8;border-radius:24px;padding:40px 40px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;padding:6px 16px;border-radius:999px;white-space:nowrap;\">In progress<\u002Fspan><h3 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#1C1E24;\">Clearer column labels<\u002Fh3><\u002Fdiv>\n        <p style=\"margin:0;font-size:27px;line-height:1.44;color:#5C5F66;\">The “Post” column will be renamed to <b style=\"color:#1C1E24;\">Override<\u002Fb> to better reflect what it does — manually setting the score sent to Canvas.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff;border:2px dashed #D4C9B8;border-radius:24px;padding:40px 40px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;padding:6px 16px;border-radius:999px;white-space:nowrap;\">In progress<\u002Fspan><h3 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#1C1E24;\">Course score gate (IE)<\u002Fh3><\u002Fdiv>\n        <p style=\"margin:0;font-size:27px;line-height:1.44;color:#5C5F66;\">An optional setting that keeps the overall course score as IE (Insufficient Evidence) until a student has at least one score on every outcome.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff;border:2px dashed #D4C9B8;border-radius:24px;padding:40px 40px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"background:#FBEEDA;color:#A9741A;font-weight:700;font-size:24px;padding:6px 16px;border-radius:999px;white-space:nowrap;\">In progress<\u002Fspan><h3 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#1C1E24;\">Single-student view<\u002Fh3><\u002Fdiv>\n        <p style=\"margin:0;font-size:27px;line-height:1.44;color:#5C5F66;\">A focused popout for one student’s outcome scores and trends — all the detail of Mastery Outlook, without leaving the dashboard.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────────────── SLIDE 10 · TIPS ───────────────────────── -->\n  <section data-label=\"Tips\" data-screen-label=\"11\" data-speaker-notes=\"Five things worth remembering, including the beta note. That's the whole tour — go try it.\" style=\"background:#14776B;color:#ffffff;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;padding:84px 104px 78px;box-sizing:border-box;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:46px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7);\">Good to know<\u002Fspan>\n        <h2 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:62px;font-weight:700;letter-spacing:-0.02em;line-height:1.02;color:#ffffff;\">Tips &amp; reminders<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-weight:700;font-size:24px;margin-top:8px;\"><span style=\"width:14px;height:14px;border-radius:5px;background:#ffffff;display:block;\"><\u002Fspan>Mastery Outlook<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:24px;\">\n      <div style=\"background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.16);border-radius:20px;padding:34px 36px;display:flex;flex-direction:column;\"><h3 style=\"margin:0 0 12px;font-size:31px;font-weight:700;color:#ffffff;\">Needs 3 attempts<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.4;color:rgba(255,255,255,0.82);\">Students with fewer show <b style=\"color:#fff;\">NE<\u002Fb> (Not Enough data) — no prediction yet.<\u002Fp><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.16);border-radius:20px;padding:34px 36px;display:flex;flex-direction:column;\"><h3 style=\"margin:0 0 12px;font-size:31px;font-weight:700;color:#ffffff;\">Reorder outcomes<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.4;color:rgba(255,255,255,0.82);\">Drag and drop; the order saves automatically for teachers and students.<\u002Fp><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.16);border-radius:20px;padding:34px 36px;display:flex;flex-direction:column;\"><h3 style=\"margin:0 0 12px;font-size:31px;font-weight:700;color:#ffffff;\">Threshold slider<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.4;color:rgba(255,255,255,0.82);\">Default 2.2, range 1.5–3.5, saved per course.<\u002Fp><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.16);border-radius:20px;padding:34px 36px;display:flex;flex-direction:column;\"><h3 style=\"margin:0 0 12px;font-size:31px;font-weight:700;color:#ffffff;\">Lock overrides<\u002Fh3><p style=\"margin:0;font-size:27px;line-height:1.4;color:rgba(255,255,255,0.82);\">Locked scores won't be overwritten by future Power Law recalculations.<\u002Fp><\u002Fdiv>\n      <div style=\"grid-column:1 / -1;background:#ffffff;border-radius:20px;padding:30px 38px;display:flex;align-items:center;gap:26px;\"><span style=\"flex-shrink:0;background:#EAF4F1;color:#14776B;font-weight:700;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;padding:10px 18px;border-radius:999px;\">Beta<\u002Fspan><span style=\"font-size:29px;font-weight:600;color:#1C1E24;line-height:1.32;\">Mastery Outlook is in beta — please report any bugs or suggestions to your Canvas admin.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
