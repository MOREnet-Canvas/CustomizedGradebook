name: Update Version Manifest

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history and tags

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate version manifest
        run: node buildScripts/update-version-manifest.js

      - name: Commit version manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "Update version manifest [skip ci]" || echo "No changes to commit"
          git push

      - name: Trigger Pages deployment
        run: gh workflow run deploy-pages.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "## Version Manifest Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat versions.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered deploy-pages.yml workflow for full deployment" >> $GITHUB_STEP_SUMMARY