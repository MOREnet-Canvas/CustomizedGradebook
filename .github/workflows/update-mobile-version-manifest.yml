name: Update Mobile Version Manifest

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-mobile-manifest:
    runs-on: ubuntu-latest
    # Only run if release tag starts with "mobile-v"
    if: startsWith(github.ref, 'refs/tags/mobile-v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Always checkout main branch, even when triggered by release
          fetch-depth: 0  # Fetch all history and tags

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate mobile version manifest
        run: node buildScripts/update-mobile-version-manifest.js

      - name: Commit mobile version manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile-versions.json
          if git diff --staged --quiet; then
            echo "No changes to mobile-versions.json - skipping commit"
          else
            git commit -m "Update mobile version manifest [skip ci]"
            git push
            echo "Mobile version manifest updated and pushed"
          fi

      - name: Trigger Pages deployment
        run: gh workflow run deploy-pages.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "## Mobile Version Manifest Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat mobile-versions.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered deploy-pages.yml workflow for full deployment" >> $GITHUB_STEP_SUMMARY